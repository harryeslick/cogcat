name: Smoke Test

on:
  push:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: "1"
      COLUMNS: "120"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run cogcat on sample image
        run: uv run cogcat image-1.png --histogram
